<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Aroma - Tienda de Especialidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg barra-navegacion sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#" id="logo-sitio">
                <i class="fa-solid fa-mug-hot me-2"></i>Coffee Aroma
            </a>

            <button class="boton-carrito position-relative" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#carrito-sidebar" id="boton-abrir-carrito">
                <i class="fa-solid fa-cart-shopping me-2"></i>Mi Pedido
                <!-- <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                    id="contador-elementos">
                    0
                </span> -->
            </button>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="display-3 fw-bold">El arte del café en cada taza</h1>
            <p class="fs-4">Seleccionamos los mejores granos del mundo para ti.</p>
        </div>
    </header>

    <main class="container mb-5">

        <section id="vista-principal">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-uppercase" style="letter-spacing: 2px;">Nuestro Menú</h2>
                <span class="text-muted" id="fecha-actual">Especial de hoy</span>
            </div>
            <div class="row mb-4 bg-white p-3 rounded-4 shadow-sm" id="barra-busqueda-filtros">

                <div class="col-md-7 col-lg-8 mb-3 mb-md-0">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0">
                            <i class="fa-solid fa-magnifying-glass text-muted"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0 shadow-none" id="input-buscador"
                            placeholder="Buscar por nombre (ej. Frappé, Espresso...)">
                    </div>
                </div>

                <div class="col-md-5 col-lg-4">
                    <select class="form-select shadow-none" id="selector-categoria">
                        <option value="todos">Todas las categorías</option>
                        <option value="Bebida caliente">Bebidas Calientes</option>
                        <option value="Bebida fría">Bebidas Frías</option>
                        <option value="postre">Postres</option>
                        <option value="comida">Comida</option>
                    </select>
                </div>

            </div>
            <div class="row g-4 justify-content-center" id="contenedor-productos">
                <!-- Aqui se van a dibujar los productos     -->
            </div>
        </section>

        <section id="vista-pago" class="d-none">
            <div class="row">
                <div class="col-lg-8" id="seccion-pago">
                    <h2 class="mb-4"><i class="fa-solid fa-credit-card me-2"></i>Finalizar Compra</h2>
                    <form id="formulario-pago">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" class="form-control form-control-lg" id="input-nombre"
                                    placeholder="Juan Pérez" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control form-control-lg" id="input-email"
                                    placeholder="juan@ejemplo.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Dirección de Entrega</label>
                                <input type="text" class="form-control form-control-lg" id="input-direccion"
                                    placeholder="Calle 10, Ciudad" required>
                            </div>
                            <div class="col-12 mt-4">
                                <h5 class="border-bottom pb-2">Método de Pago</h5>
                                <div class="form-check form-check-inline mt-2">
                                    <input class="form-check-input" type="radio" name="metodo" id="pago-tarjeta"
                                        checked>
                                    <label class="form-check-label" for="pago-tarjeta">Tarjeta de Crédito</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="metodo" id="pago-efectivo">
                                    <label class="form-check-label" for="pago-efectivo">Efectivo al recibir</label>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5">
                            <button type="submit" class="btn btn-dark btn-lg w-100" id="boton-confirmar-compra">Pagar
                                Ahora</button>
                            <button type="button" class="btn btn-link w-100 mt-2 text-decoration-none text-muted"
                                id="boton-volver-tienda">Volver a la tienda</button>
                        </div>
                    </form>
                </div>

                <div class="col-lg-4 mt-4 mt-lg-0">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body">
                            <h4>Resumen Final</h4>
                            <div id="contenedor-resumen-pago">
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold fs-5">Impuesto:</span>
                                <span class="fw-bold fs-4 text-success" id="total-final">Q 0.00</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold fs-5">SubTotal:</span>
                                <span class="fw-bold fs-4 text-success" id="total-final">Q 0.00</span>
                            </div>
                            <br>
                            
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold fs-5">Total a pagar:</span>
                                <span class="fw-bold fs-4 text-success" id="total-final">Q 0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="carrito-sidebar" aria-labelledby="carritoLabel">
        <div class="offcanvas-header text-white">
            <h5 class="offcanvas-title" id="carritoLabel">Tu Carrito <i class="fa-solid fa-shopping-basket ms-2"></i>
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">

            <div id="cuerpo-carrito" class="flex-grow-1 overflow-auto">

            </div>

            <div class="border-top pt-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fs-5 fw-bold">Subtotal:</span>
                    <span class="fs-5 fw-bold text-success" id="subtotal-carrito">Q 0.00</span>
                </div>
                <button class="btn btn-warning w-100 fw-bold py-2 mb-2" id="boton-proceder-pago" disabled>
                    PROCEDER AL PAGO <i class="fa-solid fa-arrow-right ms-2"></i>
                </button>
                <!-- <button class="btn btn-outline-secondary w-100 btn-sm" id="boton-vaciar-carrito" disabled>
                    Vaciar Carrito
                </button> -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
